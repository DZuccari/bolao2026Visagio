:root{
  --grass-700:#166534;
  --grass-600:#16a34a;
  --grass-100:#dcfce7;
  --gold-500:#ca8a04;
  --ink-900:#111827;
  --ink-500:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#fff;
  font-family:"DM Sans",system-ui,-apple-system,sans-serif;
  color:var(--ink-900);
  min-height:100vh;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:transparent;
  z-index:0;
}
#root{position:relative;z-index:1;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:999px;}
.inp:focus{border-color:var(--grass-600)!important;box-shadow:0 0 0 3px rgba(22,163,74,.12);outline:none;}
.score-inp:focus{border-color:var(--grass-600)!important;box-shadow:0 0 0 3px rgba(22,163,74,.14);outline:none;}
.btn-acc{transition:transform .12s ease,box-shadow .2s ease,filter .2s ease;}
.btn-acc:hover{filter:brightness(.98);box-shadow:0 6px 16px rgba(22,163,74,.22);}
.btn-acc:active{transform:translateY(1px);}
.pill{transition:all .18s;cursor:pointer;}
summary{list-style:none;}
summary::-webkit-details-marker{display:none;}
summary:hover{filter:brightness(.995);}
.match-card{
  border:1px solid rgba(17,24,39,.08)!important;
  animation:cardIn .32s ease both;
  position:relative;
  isolation:isolate;
  background:
    radial-gradient(260px 120px at 50% -30%,rgba(22,163,74,.12),transparent 72%),
    linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,255,255,.94))!important;
}
.match-card:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,transparent 0 48%,rgba(22,163,74,.08) 48% 52%,transparent 52%),
    radial-gradient(circle at 50% 50%,transparent 0 46px,rgba(22,163,74,.08) 47px 48px,transparent 49px);
  opacity:.5;
  z-index:0;
}
.match-card>*{position:relative;z-index:1;}
.match-card:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(17,24,39,.12)!important;}
select{cursor:pointer;}
.login-grid{grid-template-columns:minmax(0,1.05fr) minmax(320px,.95fr);}
.login-hero{min-height:480px;}
.login-hero,.home-hero,.join-hero{
  isolation:isolate;
}
.login-hero:after,.home-hero:after,.join-hero:after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(115deg,rgba(255,255,255,.12),rgba(255,255,255,0) 38%),
    radial-gradient(circle at 74% 22%,rgba(255,255,255,.16),rgba(255,255,255,0) 28%),
    linear-gradient(90deg,transparent 0 49.4%,rgba(255,255,255,.10) 49.4% 50.6%,transparent 50.6%);
  opacity:.8;
  z-index:0;
}
.login-hero>*,.home-hero>*,.join-hero>*{position:relative;z-index:1;}
.login-score-grid,.info-grid{grid-template-columns:repeat(3,1fr);}
.join-grid{grid-template-columns:minmax(0,.9fr) minmax(300px,1fr);}
.lux-card{
  position:relative;
  isolation:isolate;
  overflow:hidden;
  box-shadow:0 12px 34px rgba(17,24,39,.08),0 1px 2px rgba(17,24,39,.04)!important;
}
.lux-card:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(240px 120px at 14% -20%,rgba(22,163,74,.12),transparent 70%),
    radial-gradient(260px 150px at 110% 20%,rgba(234,179,8,.12),transparent 64%),
    linear-gradient(180deg,rgba(255,255,255,.65),rgba(255,255,255,0));
  z-index:0;
}
.lux-card>*{position:relative;z-index:1;}
.topbar-premium{
  background:#fff!important;
  border-bottom:1px solid rgba(17,24,39,.08)!important;
  box-shadow:none!important;
}
.topbar-premium:before{
  display:none;
}
.bottom-nav-premium{display:none!important;}
.bottom-nav-premium button{
  transition:transform .18s ease,color .18s ease,background .18s ease;
}
.bottom-nav-premium button:hover{
  background:rgba(22,163,74,.045)!important;
  transform:translateY(-1px);
}
.btn-acc,.pill,summary,button{
  -webkit-tap-highlight-color:transparent;
}
.mini-tile{
  position:relative;
  overflow:hidden;
}
.mini-tile:after{
  content:"";
  position:absolute;
  inset:auto -18px -24px auto;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,.35);
}
.brand-chip{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 8px 22px rgba(0,0,0,.10);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
@media (max-width:820px){
  .login-grid,.join-grid{grid-template-columns:1fr!important;}
  .login-hero{min-height:auto!important;}
}
@media (max-width:620px){
  .login-score-grid,.info-grid{grid-template-columns:1fr!important;}
}
@media (max-width:480px){
  .match-card{animation:none;}
}
</style>

function calcPts(pred,result){
  if(!result||result.home===''||result.away==='') return null;
  const ph=+pred.home,pa=+pred.away,rh=+result.home,ra=+result.away;
  if(isNaN(ph)||isNaN(pa)) return null;
  const predOutcome=ph>pa?'H':ph<pa?'A':'D';
  const realOutcome=rh>ra?'H':rh<ra?'A':'D';
  const oneScore=ph===rh||pa===ra;
  if(ph===rh&&pa===ra) return 7;
  if(predOutcome===realOutcome&&oneScore) return 4;
  if(predOutcome===realOutcome) return 3;
  if(oneScore) return 1;
  return 0;
}
const fDate=dt=>new Date(dt).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
const fTime=dt=>new Date(dt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
const dayKeySP=dt=>new Intl.DateTimeFormat('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric'}).format(new Date(dt));
const started=dt=>new Date(dt).getTime()<=Date.now();
const isToday=dt=>dayKeySP(dt)===dayKeySP(new Date());
const normalizeName=value=>value.trim().replace(/\s+/g,' ');
const isValidName=name=>name.length>=2&&name.length<=24&&!/[.#$\[\]/]/.test(name);
const parseScore=value=>{
  const n=Number(value);
  if(!Number.isInteger(n)||n<0||n>20) return null;
  return n;
};
const parseCsvLine=(line,delimiter=',')=>{
  const out=[];
  let cur='';
  let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(inQuotes&&line[i+1]==='"'){cur+='"';i++;}
      else inQuotes=!inQuotes;
      continue;
    }
    if(ch===delimiter&&!inQuotes){out.push(cur.trim());cur='';continue;}
    cur+=ch;
  }
  out.push(cur.trim());
  return out;
};

  const isAdmin = !!(me && adminIds[me]);

  const champLocked = champLockDt ? started(champLockDt) : false;
  
  // Lógica corrigida de liberação: busca o primeiro jogo daquele respectivo dia
  const unlockAt=m=>{
    const dayKey = dayKeySP(m.dt);
    const sameDayMatches = matches.filter(x => dayKeySP(x.dt) === dayKey);
    const firstMatchOfDay = sameDayMatches.length ? sameDayMatches[0] : m;
    return new Date(firstMatchOfDay.dt).getTime() - PREDICTION_OPEN_MS;
  };

  const predictionOpen=m=>Date.now()>=unlockAt(m);
  const unlockLabel=m=>`${new Date(unlockAt(m)).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',timeZone:'America/Sao_Paulo'})} às ${new Date(unlockAt(m)).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'})}`;
  const matchLocked=m=>started(m?.dt);
  const canEditMatch=m=>m&&predictionOpen(m)&&!matchLocked(m);
  const normalizeBracket=obj=>BRACKET_PHASES.reduce((acc,phase)=>{
    const arr=Array.isArray(obj?.[phase.key])?obj[phase.key]:[];
    acc[phase.key]=Array.from({length:phase.count},(_,i)=>arr[i]||'');
    return acc;
  },{});
  const normalizePodium=obj=>({...emptyPodium(),...(obj||{})});

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast({msg:'',ok:true}),2600);};
  const getName = uid => partMeta[uid]?.name || 'Sem nome';
  const meReady = !!me && !!partMeta[me]?.name;

  // ── Auth listener ───────────────────────────────────────────────────────────
  useEffect(()=>{
    const savedName = localStorage.getItem(NAME_STORAGE_KEY) || '';
    const authUnsub = auth.onAuthStateChanged(user=>{
      if(user){
        const fallbackName = normalizeName(savedName || user.displayName || (user.email?user.email.split('@')[0]:''));
        setMe(user.uid);
        setMeEmail(user.email || '');
        setNameInput(fallbackName.slice(0,24));
        setBoot(true);
      }else{
        setMe('');
        setMeName('');
        setMeEmail('');
        setMatches([]);
        setPreds({});
        setParts([]);
        setPartMeta({});
        setAdminIds({});
        setChampPreds({});
        setChampWinner('');
        setPodiumPreds({});
        setBracketPreds({});
        setOfficialPodium(emptyPodium());
        setOfficialBracket(emptyBracket());
        setAudit([]);
        setBoot(false);
      }
      setAuthReady(true);
    });
    return ()=>{authUnsub && authUnsub();};
  },[]);

  // ── Database listeners ─────────────────────────────────────────────────────
  useEffect(()=>{
    if(!authReady||!me) return;
    let live=true;
    setBoot(true);

    const onReadError=(err,path)=>{
      if(!live) return;
      console.error('Firebase read error:', path, err && (err.code||err.message||err));
      showToast('Erro de leitura no Firebase. Verifique login e regras.',false);
      setBoot(false);
    };

    ref('matches').once('value').then(snap=>{
      if(!snap.val()&&isAdmin){
        const obj={};
        BASE_MATCHES.forEach(m=>{obj[m.id]=m;});
        ref('matches').set(obj).catch(()=>{});
      }
    }).catch(err=>onReadError(err,'matches.once'));

    const matchesRef = ref('matches');
    const predsRef = ref('predictions');
    const partsRef = ref('participants');
    const adminsRef = ref('admins');
    const champRef = ref('champPreds');
    const champWinnerRef = ref('champWinner');
    const podiumRef = ref('podiumPreds');
    const bracketRef = ref('bracketPreds');
    const officialPodiumRef = ref('officialPodium');
    const officialBracketRef = ref('officialBracket');
    const auditQuery = ref('audit').limitToLast(30);

    const matchesUnsub = matchesRef.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const arr=Object.values(val).sort((a,b)=>new Date(a.dt)-new Date(b.dt));
      setMatches(arr);
      const riInit={};
      arr.forEach(m=>{riInit[m.id]=m.result||{home:'',away:''};});
      setRi(riInit);
      setBoot(false);
    }, err=>onReadError(err,'matches.on'));

    const predsUnsub = predsRef.on('value', snap=>{
      if(!live) return;
      setPreds(snap.val()||{});
    }, err=>onReadError(err,'predictions.on'));

    const partsUnsub = partsRef.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const ids=[];
      const meta={};
      Object.entries(val).forEach(([uid,item])=>{
        if(!item||typeof item!=='object') return;
        const parsedName=normalizeName((item.name||'').toString()).slice(0,24);
        if(!isValidName(parsedName)) return;
        ids.push(uid);
        meta[uid]={name:parsedName,email:item.email||''};
      });
      setParts(ids);
      setPartMeta(meta);
    }, err=>onReadError(err,'participants.on'));

    const adminsUnsub = adminsRef.on('value', snap=>{
      if(!live) return;
      setAdminIds(snap.val()||{});
    }, err=>onReadError(err,'admins.on'));

    const auditUnsub = auditQuery.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const arr=Object.entries(val).map(([id,item])=>({id,...item})).sort((a,b)=>(b.ts||0)-(a.ts||0));
      setAudit(arr);
    }, err=>onReadError(err,'audit.on'));

    const champUnsub = champRef.on('value', snap=>{
      if(!live) return;
      setChampPreds(snap.val()||{});
    }, err=>onReadError(err,'champPreds.on'));

    const champWinUnsub = champWinnerRef.on('value', snap=>{
      if(!live) return;
      setChampWinner(snap.val()||'');
    }, err=>onReadError(err,'champWinner.on'));

    const podiumUnsub = podiumRef.on('value', snap=>{
      if(!live) return;
      setPodiumPreds(snap.val()||{});
    }, err=>onReadError(err,'podiumPreds.on'));

    const bracketUnsub = bracketRef.on('value', snap=>{
      if(!live) return;
      setBracketPreds(snap.val()||{});
    }, err=>onReadError(err,'bracketPreds.on'));

    const officialPodiumUnsub = officialPodiumRef.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||emptyPodium();
      setOfficialPodium({...emptyPodium(),...val});
      setOfficialPodiumInput({...emptyPodium(),...val});
      if(val.champ) setAdminChampInput(val.champ);
    }, err=>onReadError(err,'officialPodium.on'));

    const officialBracketUnsub = officialBracketRef.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||emptyBracket();
      const normalized=normalizeBracket(val);
      setOfficialBracket(normalized);
      setOfficialBracketInput(normalized);
    }, err=>onReadError(err,'officialBracket.on'));

    return ()=>{
      live=false;
      matchesRef.off('value', matchesUnsub);
      predsRef.off('value', predsUnsub);
      partsRef.off('value', partsUnsub);
      adminsRef.off('value', adminsUnsub);
      auditQuery.off('value', auditUnsub);
      champRef.off('value', champUnsub);
      champWinnerRef.off('value', champWinUnsub);
      podiumRef.off('value', podiumUnsub);
      bracketRef.off('value', bracketUnsub);
      officialPodiumRef.off('value', officialPodiumUnsub);
      officialBracketRef.off('value', officialBracketUnsub);

    if(!me||matches.length===0) return;

  },[me, matches, preds[me], champPreds[me], podiumPreds[me], bracketPreds[me]]);

    if(me) setChampInput(champPreds[me]||'');

  useEffect(()=>{
    if(me&&partMeta[me]?.name){

      if(!nameInput) setNameInput(partMeta[me].name);

  useEffect(()=>{

        name:raw,
        email:meEmail||'',
        updatedAt:firebase.database.ServerValue.TIMESTAMP,

    const id='cx_'+Date.now();
    const m={...newM,id,dt:dtObj.toISOString(),home:newM.home.trim(),away:newM.away.trim(),venue:newM.venue.trim()};
    try{
      await ref('matches/'+id).set(m);
      setNewM({home:'',away:'',ph:'Grupos',gr:'A',dt:'',venue:''});
      showToast('Partida adicionada!');
    }catch{
      showToast('Erro ao adicionar.',false);
    }
  };

  const copyLink=()=>{
    navigator.clipboard.writeText(window.location.href)
      .then(()=>showToast('Link copiado! 🔗'))
      .catch(()=>showToast('Copie a URL do navegador',false));
  };

  const copyRanking=()=>{
    const lines=[
      'Ranking do Nosso Bolão 2026',
      ...board.slice(0,10).map((p,i)=>`${i+1}. ${p.name} - ${p.pts} pts`)
    ];
    navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('Ranking copiado!'));
  };

  // ── Computed ────────────────────────────────────────────────────────────────
  const scoredMatches=matches.filter(m=>m.result&&m.result.home!==''&&m.result.home!==undefined);
  const scoreBoardForMatches=(scopeMatches)=>[...parts].map(uid=>{
    const name=getName(uid);
    let gamePts=0,groupPts=0,elimPts=0,exact=0,win=0,miss=0,total=0;
    scopeMatches.forEach(m=>{
      const p=(preds[uid]||{})[m.id]; if(!p) return;
      const x=calcPts(p,m.result); if(x===null) return;
      total++;gamePts+=x;if(m.ph==='Grupos') groupPts+=x; else elimPts+=x;
      if(x===7)exact++;else if(x===4||x===3)win++;else miss++;
    });
    return {uid,name,pts:gamePts,gamePts,groupPts,elimPts,exact,win,miss,total};
  }).sort((a,b)=>b.pts-a.pts||b.exact-a.exact||a.name.localeCompare(b.name,'pt-BR'));

  const board=scoreBoardForMatches(matches);
  const myPredMap=preds[me]||{};
  const groupMatches=matches.filter(m=>m.ph==='Grupos');
  const knockoutMatches=matches.filter(m=>m.ph!=='Grupos');

  // Filtro de abertos e disponíveis baseado no tempo real correto
  const groupAbertosAgora = groupMatches.filter(m => canEditMatch(m)).length;
  const knockoutAbertosAgora = knockoutMatches.filter(m => canEditMatch(m)).length;

  const savedGroupPredCount=groupMatches.filter(m=>myPredMap[m.id]&&myPredMap[m.id].home!=='').length;
  const savedKnockoutPredCount=knockoutMatches.filter(m=>myPredMap[m.id]&&myPredMap[m.id].home!=='').length;

  const predictionMatches=onlyMissing
    ? matches.filter(m=>!matchLocked(m)&&(!(preds[me]||{})[m.id]||(preds[me]||{})[m.id].home===''))
    : matches;

  const groupByDay=list=>{
    const groups=[];
    const index={};
    list.forEach(m=>{
      const key=dayKeySP(m.dt);
      if(!index[key]){
        index[key]={
          key,
          label:new Date(m.dt).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',timeZone:'America/Sao_Paulo'}),
          matches:[],
        };
        groups.push(index[key]);
      }
      index[key].matches.push(m);
    });
    return groups;
  };

  const groupPredictionDayGroups=groupByDay(predictionMatches.filter(m=>m.ph==='Grupos'));
  const knockoutPredictionDayGroups=groupByDay(predictionMatches.filter(m=>m.ph!=='Grupos'));
  const dailyBoards=groupByDay(scoredMatches).map(group=>({
    ...group,
    board:scoreBoardForMatches(group.matches).filter(p=>p.total>0||p.pts>0),
  })).filter(group=>group.board.length>0);

  const StatTile=({value,label,color=T.txt1,bg=T.bg})=>(
    <div className="mini-tile" style={{background:bg,border:`1px solid ${T.border}`,borderRadius:14,padding:'12px 10px',textAlign:'center',minHeight:62,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style={{fontSize:22,fontWeight:950,color,lineHeight:1}}>{value}</div>
      <div style={{fontSize:9,color:T.txt3,marginTop:5,textTransform:'uppercase',letterSpacing:.6,fontWeight:900}}>{label}</div>
    </div>
  );

  const SectionTitle=({title,text})=>(
    <div style={{display:'flex',alignItems:'flex-end',gap:12,margin:'20px 0 10px'}}>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:950,color:T.txt3,letterSpacing:1,textTransform:'uppercase'}}>{title}</div>
        {text&&<div style={{fontSize:12,color:T.txt3,marginTop:3,lineHeight:1.45}}>{text}</div>}
      </div>
    </div>
  );

  // ── Match Card ──────────────────────────────────────────────────────────────
  const MatchCard=({m})=>{
    const st=matchLocked(m);
    const open=predictionOpen(m);
    const editable=canEditMatch(m);
    const hasR=m.result&&m.result.home!=='';
    const myS=(preds[me]||{})[m.id];
    const pts=myS?calcPts(myS,m.result):null;
    const inp=pi[m.id]||{home:'',away:''};
    const hasPred=myS&&myS.home!=='';
    const ptBg=pts===7?T.okBg:(pts===4||pts===3)?T.halfBg:pts===1?'#DBEAFE':pts===0?T.errBg:null;
    const ptCol=pts===7?T.ok:(pts===4||pts===3)?T.half:pts===1?'#1D4ED8':pts===0?T.err:null;
    const ptLabel=pts===7?'⭐ Exato':pts===4?'✓ Vencedor + gol':pts===3?'✓ Vencedor':pts===1?'⚽ Gol':pts===0?'✗ Errou':null;
    const dirty=String(inp.home??'')!==String(myS?.home??'')||String(inp.away??'')!==String(myS?.away??'');
    const statusColor=hasR?T.gold:st?'#1D4ED8':!open?T.txt3:hasPred?T.accent:T.half;
    const statusBg=hasR?T.goldBg:st?'#DBEAFE':!open?'#F1F5F9':hasPred?T.accentLt:T.halfBg;
    const statusText=hasR?'Resultado':st?'Fechado':!open?'Bloqueado':hasPred?'Salvo':'Aberto';

    return (
      <div className="match-card" style={{background:T.card,borderRadius:16,border:`1px solid ${T.border}`,borderLeft:`4px solid ${statusColor}`,marginBottom:10,overflow:'hidden',boxShadow:shadow}}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',borderBottom:`1px solid ${T.border}`,background:hasPred&&editable?T.accentLt:T.bg}}>
          <span style={{fontSize:11,fontWeight:700,color:T.accent,background:T.accentLt,padding:'2px 9px',borderRadius:20}}>
            {m.ph==='Grupos'?`Grupo ${m.gr}`:m.ph}
          </span>
          <span style={{fontSize:11,color:T.txt3,flex:1}}>{fDate(m.dt)} · {fTime(m.dt)}</span>
          <span style={{fontSize:10,fontWeight:800,color:statusColor,background:statusBg,padding:'2px 9px',borderRadius:20}}>{statusText}</span>
          {ptLabel&&<span style={{fontSize:10,fontWeight:700,color:ptCol,background:ptBg,padding:'2px 9px',borderRadius:20}}>{ptLabel}</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',padding:'16px 14px 12px'}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'flex-start',gap:4}}>
            <span style={{fontSize:40,lineHeight:1}}>{fl(m.home)}</span>
            <span style={{fontSize:12,fontWeight:700,color:T.txt1,maxWidth:90,lineHeight:1.3,marginTop:2}}>{m.home}</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'0 8px',minWidth:130}}>
            {hasR&&(
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{fontSize:24,fontWeight:900,color:T.gold,background:T.goldBg,width:40,height:40,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>{m.result.home}</div>
                <span style={{color:T.borderMd,fontWeight:700}}>–</span>
                <div style={{fontSize:24,fontWeight:900,color:T.gold,background:T.goldBg,width:40,height:40,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>{m.result.away}</div>
              </div>
            )}
            {editable?(
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <input className="score-inp" type="number" min="0" max="20" placeholder="–" style={scoreInpSt} value={inp.home} onChange={e=>setPi(p=>({...p,[m.id]:{...p[m.id],home:e.target.value}}))}/>
                <span style={{color:T.borderMd,fontWeight:700}}>×</span>
                <input className="score-inp" type="number" min="0" max="20" placeholder="–" style={scoreInpSt} value={inp.away} onChange={e=>setPi(p=>({...p,[m.id]:{...p[m.id],away:e.target.value}}))}/>
              </div>
            ):(
              !hasR&&<span style={{fontSize:13,color:T.txt3,fontWeight:600,letterSpacing:2}}>VS</span>
            )}
            {editable&&(
              <button className="btn-acc" style={{padding:'4px 14px',borderRadius:8,border:'none',fontSize:11,fontWeight:700,background:(!hasPred||dirty)?T.accent:T.accentLt,color:(!hasPred||dirty)?'#fff':T.accent}} onClick={()=>savePred(m.id)}>
                {saving===m.id?'...':hasPred?(dirty?'Atualizar':'✓ Salvo'):'Salvar'}
              </button>
            )}
            {!editable&&!hasR&&!st&&<div style={{fontSize:10,color:T.txt3}}>Libera em: {unlockLabel(m)}</div>}
            {st&&hasPred&&<div style={{fontSize:10,color:T.txt3}}>Seu: {myS.home}×{myS.away}</div>}
          </div>
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
            <span style={{fontSize:40,lineHeight:1}}>{fl(m.away)}</span>
            <span style={{fontSize:12,fontWeight:700,color:T.txt1,maxWidth:90,lineHeight:1.3,textAlign:'right',marginTop:2}}>{m.away}</span>
          </div>
        </div>
      </div>
    );
  };

  if(boot) return (
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:8}}>⚽</div><div style={{fontSize:13,color:T.txt3}}>carregando bolão...</div></div>
    </div>
  );

  if(!me) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,background:T.bg}}>
      <div className="login-grid" style={{width:'100%',maxWidth:980,display:'grid',gap:18}}>
        <div className="login-hero" style={{background:'linear-gradient(135deg,#166534 0%,#16a34a 55%,#65a30d 100%)',borderRadius:24,padding:'34px 30px',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
          <div>
            <div style={{fontFamily:'"Bebas Neue", sans-serif',fontSize:72,color:'#fff',letterSpacing:3}}>BOLÃO COPA 2026</div>
            <p style={{fontSize:15,color:'rgba(255,255,255,.8)',marginTop:12}}>Plataforma limpa, sem spoiler e organizada por rodadas automáticas de liberação.</p>
          </div>
        </div>
        <div className="lux-card" style={{background:'#fff',borderRadius:22,padding:24,border:'1px solid '+T.border}}>
          <h3 style={{marginBottom:12}}>Entre no Painel</h3>
          <button className="btn-acc" style={{...btnAcc,width:'100%',padding:14}} onClick={signInGoogle}>Entrar com Google</button>
        </div>
      </div>
    </div>
  );

  if(!meReady) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent={meReady?'flex-start':'center'},padding:24,background:T.bg}}>
      <div className="lux-card" style={{background:'#fff',padding:24,borderRadius:22,maxWidth:420,width:'100%',border:'1px solid '+T.border}}>
        <h2 style={{fontSize:18,marginBottom:12}}>Identificação do Usuário</h2>
        <input className="inp" style={{...inpSt,marginBottom:12}} placeholder="Seu nome ou apelido" value={nameInput} onChange={e=>setNameInput(e.target.value)}/>
        <button className="btn-acc" style={{...btnAcc,width:'100%'}} onClick={join}>Salvar e Acessar</button>
      </div>
    </div>
  );

  // ── Tabs Contents ───────────────────────────────────────────────────────────
  const TabHome=(
    <div style={{padding:'28px 14px 72px',maxWidth:760,margin:'0 auto'}}>
      <h1 style={{fontSize:30,color:T.txt1}}>Olá, {meName}! 👋</h1>
      <p style={{fontSize:14,color:T.txt2,marginTop:4}}>Controle de janelas e rodadas ativo para a Copa do Mundo de 2026.</p>
      
      <div style={{marginTop:24}}>
        {[
          {title:'Fase de Grupos', count: groupAbertosAgora, text:'Jogos abertos para palpitar neste momento baseado na janela de 48h de liberação do dia.', meta: `${savedGroupPredCount} de ${groupMatches.length} salvos`, action:()=>{setTab('matches');setMatchView('groups');}},
          {title:'Eliminatórias (Mata-mata)', count: knockoutAbertosAgora, text:'Janela de liberação de 48h do primeiro jogo da rodada correspondente.', meta: `${savedKnockoutPredCount} de ${knockoutMatches.length} salvos`, action:()=>{setTab('matches');setMatchView('knockout');}}
        ].map(item=>(
          <div key={item.title} style={{background:'#fff',border:'1px solid '+T.border,borderRadius:16,padding:20,marginBottom:12,display:'flex',alignItems:'center',gap:16}}>
            <div style={{width:52,height:52,borderRadius:12,background:item.count>0?T.accentLt:T.bg,color:item.count>0?T.accent:T.txt3,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:900}}>{item.count}</div>
            <div style={{flex:1}}>
              <h4 style={{fontSize:16,color:T.txt1}}>{item.title} <span style={{fontSize:11,fontWeight:500,color:T.txt3,marginLeft:6}}>({item.meta})</span></h4>
              <p style={{fontSize:12,color:T.txt2,marginTop:4,lineHeight:1.4}}>{item.text}</p>
              <button style={{marginTop:10,background:'none',border:'none',color:T.accent,fontSize:12,fontWeight:700,cursor:'pointer'}} onClick={item.action}>Ver jogos ›</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  const TabMatches=(
    <div style={{padding:'28px 14px 72px',maxWidth:1120,margin:'0 auto'}}>
      <h1 style={{fontSize:26,marginBottom:14}}>{matchView==='groups'?'Fase de Grupos':'Fase Eliminatória'}</h1>
      <div style={{display:'flex',gap:10,marginBottom:20}}>
        <button className="pill" style={{padding:'8px 16px',borderRadius:20,border:'1px solid '+(matchView==='groups'?T.accent:T.border),background:matchView==='groups'?T.accentLt:'#fff',color:matchView==='groups'?T.accent:T.txt1}} onClick={()=>setMatchView('groups')}>Grupos</button>
        <button className="pill" style={{padding:'8px 16px',borderRadius:20,border:'1px solid '+(matchView==='knockout'?T.accent:T.border),background:matchView==='knockout'?T.accentLt:'#fff',color:matchView==='knockout'?T.accent:T.txt1}} onClick={()=>setMatchView('knockout')}>Mata-Mata</button>
      </div>

      {matchView==='groups' && groupPredictionDayGroups.map(group=>(
        <div key={group.key} style={{marginBottom:24}}>
          <h3 style={{fontSize:14,color:T.txt1,marginBottom:10,textTransform:'capitalize'}}>📅 {group.label}</h3>
          {group.matches.map(m=><MatchCard key={m.id} m={m}/>)}
        </div>
      ))}

      {matchView==='knockout' && (knockoutPredictionDayGroups.length ? knockoutPredictionDayGroups.map(group=>(
        <div key={group.key} style={{marginBottom:24}}>
          <h3 style={{fontSize:14,color:T.txt1,marginBottom:10,textTransform:'capitalize'}}>🏟️ {group.label}</h3>
          {group.matches.map(m=><MatchCard key={m.id} m={m}/>)}
        </div>
      )) : <p style={{color:T.txt3,fontSize:13}}>Nenhuma eliminatória cadastrada até o momento.</p>)}
    </div>
  );

  const TabRanking=(
    <div style={{padding:'28px 14px 72px',maxWidth:1120,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h2>Classificação Geral</h2>
        <button className="pill" style={{padding:'6px 12px',border:'1px solid '+T.border,background:'#fff',borderRadius:8,fontSize:12}} onClick={copyRanking}>Copiar Classificação</button>
      </div>
      <div style={{background:'#fff',border:'1px solid '+T.border,borderRadius:16,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:14}}>
          <thead>
            <tr style={{background:T.bg,color:T.txt1,textAlign:'left'}}><th style={{padding:12}}>Pos</th><th style={{padding:12}}>Nome</th><th style={{padding:12,textAlign:'center'}}>Exatos</th><th style={{padding:12,textAlign:'right'}}>Pts</th></tr>
          </thead>
          <tbody>
            {board.map((p,i)=>(
              <tr key={p.uid} style={{borderTop:'1px solid '+T.border,background:p.uid===me?'#F0FDF4':'none'}}>
                <td style={{padding:12,fontWeight:700}}>{i+1}º</td>
                <td style={{padding:12}}>{p.name} {p.uid===me && '(Você)'}</td>
                <td style={{padding:12,textAlign:'center'}}>{p.exact}</td>
                <td style={{padding:12,textAlign:'right',fontWeight:900}}>{p.pts}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );

  const TabRules=(
    <div style={{padding:'28px 14px 72px',maxWidth:760,margin:'0 auto'}}>
      <h2 style={{marginBottom:14}}>Regras de Funcionamento</h2>
      <div style={{display:'flex',flexDirection:'column',gap:10,fontSize:13,color:T.txt2,lineHeight:1.6}}>
        <p>• <strong>Regra de Janela Unificada:</strong> Todos os palpites de um determinado dia ou rodada abrem juntos, exatamente 48h antes do primeiro jogo daquele bloco de partidas.</p>
        <p>• <strong>Bloqueio de Spoiler:</strong> O sistema bloqueia a visualização e alteração de placares no minuto exato do pontapé inicial de cada partida individualmente.</p>
        <p>• <strong>Pontuação:</strong> 7 pontos por placar exato; 4 pontos para acerto de vencedor/empate + gols de uma equipe; 3 pontos apenas para vencedor/empate; 1 ponto para acerto isolado de gols de um time.</p>
      </div>
    </div>
  );

  const TabAdmin=(
    <div style={{padding:'28px 14px 72px',maxWidth:1120,margin:'0 auto'}}>
      <h2>Painel Administrativo</h2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginTop:16}}>
        <div style={{background:'#fff',padding:16,borderRadius:14,border:'1px solid '+T.border}}>
          <h3>Lançar Resultados</h3>
          <div style={{marginTop:12,maxHeight:300,overflowY:'auto'}}>
            {matches.map(m=>(
              <div key={m.id} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 0',borderBottom:'1px solid '+T.border}}>
                <span style={{fontSize:12,flex:1}}>{m.home} x {m.away}</span>
                <input style={{width:32,textAlign:'center'}} type="number" value={ri[m.id]?.home||''} onChange={e=>setRi(r=>({...r,[m.id]:{...r[m.id],home:e.target.value}}))}/>
                <input style={{width:32,textAlign:'center'}} type="number" value={ri[m.id]?.away||''} onChange={e=>setRi(r=>({...r,[m.id]:{...r[m.id],away:e.target.value}}))}/>
                <button onClick={()=>saveResult(m.id)}>OK</button>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:'#fff',padding:16,borderRadius:14,border:'1px solid '+T.border}}>
          <h3>Inserir Jogo Manual (Mata-Mata)</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:12}}>
            <input className="inp" style={inpSt} placeholder="Time Casa" value={newM.home} onChange={e=>setNewM(p=>({...p,home:e.target.value}))}/>
            <input className="inp" style={inpSt} placeholder="Time Fora" value={newM.away} onChange={e=>setNewM(p=>({...p,away:e.target.value}))}/>
            <select className="inp" style={inpSt} value={newM.ph} onChange={e=>setNewM(p=>({...p,ph:e.target.value}))}>
              <option value="32-avos">32-avos</option>
              <option value="Oitavas">Oitavas</option>
              <option value="Quartas">Quartas</option>
              <option value="Semis">Semis</option>
              <option value="Final">Final</option>
            </select>
            <input className="inp" style={inpSt} type="datetime-local" value={newM.dt} onChange={e=>setNewM(p=>({...p,dt:e.target.value}))}/>
            <button className="btn-acc" style={btnAcc} onClick={addMatch}>Inserir Partida</button>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:T.bg}}>
      {toast.msg&&<div style={{position:'fixed',top:14,left:'50%',transform:'translateX(-50%)',background:toast.ok?T.ok:T.err,color:'#fff',padding:'9px 22px',borderRadius:24,zIndex:1000}}>{toast.msg}</div>}
      
      <div className="topbar-premium" style={{background:'#fff',padding:'14px 20px',position:'sticky',top:0,zIndex:100,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <strong style={{color:T.accent}}>Bolão Copa 2026 ⚽</strong>
        <nav style={{display:'flex',gap:16}}>
          <button style={{background:'none',border:'none',fontWeight:tab==='home'?900:500,cursor:'pointer'}} onClick={()=>setTab('home')}>Início</button>
          <button style={{background:'none',border:'none',fontWeight:tab==='matches'?900:500,cursor:'pointer'}} onClick={()=>setTab('matches')}>Palpites</button>
          <button style={{background:'none',border:'none',fontWeight:tab==='ranking'?900:500,cursor:'pointer'}} onClick={()=>setTab('ranking')}>Ranking</button>
          <button style={{background:'none',border:'none',fontWeight:tab==='rules'?900:500,cursor:'pointer'}} onClick={()=>setTab('rules')}>Regras</button>
          {isAdmin && <button style={{background:'none',border:'none',fontWeight:tab==='admin'?900:500,cursor:'pointer'}} onClick={()=>setTab('admin')}>Painel Admin</button>}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:12,color:T.txt2}}>{meName}</span>
          <button style={{fontSize:11,padding:'4px 8px',cursor:'pointer'}} onClick={logout}>Sair</button>
        </div>
      </div>

      <div style={{flex:1}}>
        {tab==='home'&&TabHome}
        {tab==='matches'&&TabMatches}
        {tab==='ranking'&&TabRanking}
        {tab==='rules'&&TabRules}
        {tab==='admin'&&TabAdmin}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Bolao/>);
</script>
</body>
</html>
